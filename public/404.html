<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ControlFin - Gestão Financeira</title>
    <script>
      var path = location.pathname;
      if (path.indexOf('/controlfin/') === 0) {
        path = path.replace('/controlfin/', '/');
      }
      if (path !== location.pathname) {
        location.replace(path + (location.search || '') + (location.hash || ''));
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/controlfin/index.js"></script>
  </body>
</html>
